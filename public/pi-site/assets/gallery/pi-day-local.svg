<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Pi Day Celebration</title>
  <desc id="desc">A festive local Pi Day banner with pie slices and the date March 14.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g fill="#7c2d12" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="600" y="170" font-size="78" font-weight="700">Pi Day</text>
    <text x="600" y="250" font-size="46">March 14</text>
  </g>
  <g transform="translate(600 500)">
    <circle r="250" fill="#f59e0b"/>
    <circle r="215" fill="#fcd34d"/>
    <path d="M0 0 L250 0 A250 250 0 0 1 78 237 Z" fill="#fb7185"/>
    <circle r="18" cx="110" cy="-76" fill="#7c2d12"/>
    <circle r="18" cx="160" cy="16" fill="#7c2d12"/>
    <circle r="18" cx="58" cy="142" fill="#7c2d12"/>
    <circle r="18" cx="-82" cy="126" fill="#7c2d12"/>
    <circle r="18" cx="-146" cy="12" fill="#7c2d12"/>
    <circle r="18" cx="-88" cy="-116" fill="#7c2d12"/>
    <circle r="18" cx="32" cy="-154" fill="#7c2d12"/>
  </g>
  <g fill="#9a3412" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="820" font-size="34" font-weight="700">3.14159 • Pie • Math • Celebration</text>
  </g>
</svg>
