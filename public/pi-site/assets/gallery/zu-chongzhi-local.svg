<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Zu Chongzhi</title>
  <desc id="desc">A local illustrated tribute card for Zu Chongzhi with his pi approximation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="110" y="90" width="980" height="720" rx="36" fill="#ffffff" stroke="#cbd5e1" stroke-width="8"/>
  <circle cx="360" cy="370" r="145" fill="#e2e8f0"/>
  <circle cx="360" cy="330" r="82" fill="#cbd5e1"/>
  <path d="M255 470c26-78 183-78 210 0v70H255z" fill="#94a3b8"/>
  <g fill="#0f172a" font-family="Georgia, 'Times New Roman', serif">
    <text x="560" y="260" font-size="70" font-weight="700">Zu Chongzhi</text>
    <text x="560" y="335" font-size="34">Chinese mathematician and astronomer</text>
    <text x="560" y="432" font-size="54" font-weight="700">355 / 113</text>
    <text x="560" y="490" font-size="32">An exceptionally accurate value of pi for the 5th century.</text>
  </g>
  <g fill="#475569" font-family="Arial, sans-serif" font-size="28">
    <text x="560" y="610">Approximation: 3.14159292...</text>
    <text x="560" y="662">Accurate to six decimal places.</text>
  </g>
</svg>
