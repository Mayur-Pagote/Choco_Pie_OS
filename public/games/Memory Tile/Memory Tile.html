<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥧 World of Pi — Memory Tile Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --primary: #6C3483;
            --primary-light: #A569BD;
            --secondary: #E74C3C;
            --accent: #F39C12;
            --bg-dark: #1a1025;
            --bg-card: #2d1f3d;
            --text-light: #F8F9FA;
            --text-muted: #ADB5BD;
            --success: #27AE60;
            --glow-purple: rgba(108, 52, 131, 0.6);
            --glow-gold: rgba(243, 156, 18, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            color: var(--text-light);
        }

        .game-shell {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-bottom: 12px;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            animation: floatUp linear infinite;
            opacity: 0.06;
            font-size: 2rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.07; }
            90% { opacity: 0.07; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ===== HEADER ===== */
        .game-header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 30px 20px 10px;
        }

        .game-header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            background: linear-gradient(135deg, #F39C12, #E74C3C, #A569BD, #3498DB);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.3));
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .game-header .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(45, 31, 61, 0.9), rgba(30, 20, 45, 0.9));
            border: 1px solid rgba(165, 105, 189, 0.3);
            border-radius: 16px;
            padding: 16px 28px;
            text-align: center;
            min-width: 120px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--glow-gold);
            transform: translateY(-2px);
        }

        .stat-card .stat-value {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 2px;
        }

        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== CONTROLS ===== */
        .controls-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 10px 20px 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(45, 31, 61, 0.7);
            border: 1px solid rgba(165, 105, 189, 0.25);
            border-radius: 14px;
            padding: 8px 16px;
            backdrop-filter: blur(10px);
        }

        .control-group label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .size-btn {
            width: 42px;
            height: 42px;
            border: 2px solid rgba(165, 105, 189, 0.4);
            border-radius: 10px;
            background: transparent;
            color: var(--text-light);
            font-family: 'Fredoka One', cursive;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .size-btn:hover {
            border-color: var(--accent);
            background: rgba(243, 156, 18, 0.15);
            transform: scale(1.1);
        }

        .size-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 15px var(--glow-gold);
            transform: scale(1.1);
        }

        .btn-action {
            padding: 10px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-restart {
            background: linear-gradient(135deg, var(--secondary), #C0392B);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(231, 76, 60, 0.6);
        }

        /* ===== THEME BADGES ===== */
        .theme-badges {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 20px 20px;
            flex-wrap: wrap;
        }

        .theme-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(45, 31, 61, 0.6);
            border: 1px solid rgba(165, 105, 189, 0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            backdrop-filter: blur(5px);
        }

        .theme-badge .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .badge-raspberry .badge-dot { background: #E74C3C; }
        .badge-choco .badge-dot { background: #8B4513; }
        .badge-pie .badge-dot { background: #F39C12; }
        .badge-math .badge-dot { background: #3498DB; }

        /* ===== GAME BOARD ===== */
        .game-board-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
            padding: 0 20px 16px;
        }

        .game-board {
            display: grid;
            gap: 12px;
            padding: 20px;
            background: rgba(20, 12, 30, 0.5);
            border: 1px solid rgba(165, 105, 189, 0.15);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            max-width: 700px;
            max-height: 700px;
            width: min(100%, var(--board-size, 700px));
            height: min(100%, var(--board-size, 700px));
        }

        /* ===== TILE CARDS ===== */
        .tile {
            aspect-ratio: 1;
            perspective: 800px;
            cursor: pointer;
        }

        .tile-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .tile.flipped .tile-inner,
        .tile.matched .tile-inner {
            transform: rotateY(180deg);
        }

        .tile-front, .tile-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tile-front {
            background: linear-gradient(145deg, #3d2a54, #2a1c3d);
            border: 2px solid rgba(165, 105, 189, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .tile-front::before {
            content: '🥧';
            font-size: 2rem;
            opacity: 0.25;
            filter: grayscale(0.5);
        }

        .tile-front::after {
            content: '?';
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: rgba(165, 105, 189, 0.4);
            margin-top: 2px;
        }

        .tile:hover .tile-front {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--glow-gold),
                        0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .tile-back {
            transform: rotateY(180deg);
            border: 2px solid;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .tile-back .tile-emoji {
            font-size: 2.8rem;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .tile-back .tile-label {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* Theme-specific back colors */
        .tile-back.theme-raspberry {
            background: linear-gradient(145deg, #922B21, #641E16);
            border-color: #E74C3C;
        }
        .tile-back.theme-choco {
            background: linear-gradient(145deg, #6D4C2A, #4A3218);
            border-color: #D4A574;
        }
        .tile-back.theme-pie {
            background: linear-gradient(145deg, #B7770A, #7D5308);
            border-color: #F5CBA7;
        }
        .tile-back.theme-math {
            background: linear-gradient(145deg, #1F618D, #154360);
            border-color: #5DADE2;
        }

        /* Matched state */
        .tile.matched .tile-back {
            animation: matchPulse 0.6s ease;
        }

        .tile.matched .tile-front,
        .tile.matched .tile-back {
            box-shadow: 0 0 25px var(--glow-gold);
        }

        @keyframes matchPulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* Shake on mismatch */
        .tile.shake .tile-inner {
            animation: shakeTile 0.5s ease;
        }

        @keyframes shakeTile {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20% { transform: rotateY(180deg) translateX(-8px); }
            40% { transform: rotateY(180deg) translateX(8px); }
            60% { transform: rotateY(180deg) translateX(-5px); }
            80% { transform: rotateY(180deg) translateX(5px); }
        }

        /* ===== WIN OVERLAY ===== */
        .win-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 5, 20, 0.92);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .win-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .win-card {
            text-align: center;
            background: linear-gradient(145deg, #2d1f3d, #1a1025);
            border: 2px solid var(--accent);
            border-radius: 28px;
            padding: 50px 60px;
            box-shadow: 0 0 60px var(--glow-gold),
                        0 0 120px rgba(243, 156, 18, 0.2);
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            max-width: 90vw;
        }

        @keyframes bounceIn {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .win-card .trophy {
            font-size: 5rem;
            animation: trophyBounce 2s ease infinite;
        }

        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(5deg); }
        }

        .win-card h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #F39C12, #E74C3C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0 5px;
        }

        .win-card .win-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .win-stats {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin: 20px 0 30px;
        }

        .win-stat {
            text-align: center;
        }

        .win-stat .ws-value {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: var(--accent);
        }

        .win-stat .ws-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .star-rating {
            font-size: 2.5rem;
            margin: 10px 0 25px;
        }

        .star-rating .star-empty {
            opacity: 0.2;
        }

        .btn-play-again {
            padding: 14px 40px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(243, 156, 18, 0.4);
        }

        .btn-play-again:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(243, 156, 18, 0.6);
        }

        /* ===== TIMER PROGRESS BAR ===== */
        .timer-bar {
            position: relative;
            z-index: 10;
            max-width: 700px;
            margin: 0 auto 10px;
            padding: 0 20px;
        }

        .timer-bar-inner {
            height: 4px;
            background: rgba(165, 105, 189, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--accent), var(--secondary));
            border-radius: 2px;
            transition: width 1s linear;
            width: 0%;
        }

        /* ===== CONFETTI ===== */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            top: -10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }

        .compact-layout .game-header {
            padding: 18px 16px 8px;
        }

        .compact-layout .game-header h1 {
            font-size: clamp(1.9rem, 4vw, 2.5rem);
        }

        .compact-layout .game-header .subtitle {
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        .compact-layout .stats-bar {
            gap: 10px;
            padding: 10px 16px;
        }

        .compact-layout .stat-card {
            min-width: 92px;
            padding: 10px 16px;
        }

        .compact-layout .stat-card .stat-value {
            font-size: 1.3rem;
        }

        .compact-layout .controls-container {
            gap: 10px;
            padding: 8px 16px 12px;
        }

        .compact-layout .control-group {
            padding: 7px 12px;
        }

        .compact-layout .theme-badges {
            gap: 8px;
            padding: 0 16px 12px;
        }

        .compact-layout .theme-badge {
            padding: 5px 10px;
            font-size: 0.68rem;
        }

        .compact-layout .timer-bar {
            margin-bottom: 8px;
            padding: 0 16px;
        }

        .compact-layout .game-board-wrapper {
            padding: 0 16px 12px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .game-shell { padding-bottom: 8px; }
            .game-header h1 { font-size: 2rem; }
            .stats-bar { gap: 8px; }
            .stat-card { padding: 10px 14px; min-width: 75px; }
            .stat-card .stat-value { font-size: 1.2rem; }
            .game-board { gap: 8px; padding: 12px; }
            .tile-back .tile-emoji { font-size: 2rem; }
            .tile-front::before { font-size: 1.4rem; }
            .tile-front::after { font-size: 1rem; }
            .win-card { padding: 30px 25px; }
            .win-card h2 { font-size: 1.8rem; }
            .controls-container { gap: 8px; }
        }

        @media (max-height: 820px) {
            .game-header { padding: 18px 16px 8px; }
            .stats-bar { padding: 10px 16px; }
            .controls-container { padding: 8px 16px 12px; }
            .theme-badges { padding: 0 16px 12px; }
        }

        /* ===== LOADING SHIMMER ===== */
        .tile.loading .tile-front {
            background: linear-gradient(145deg, #3d2a54, #2a1c3d);
            animation: shimmer 1.5s ease infinite;
        }

        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="bgAnimation"></div>

    <main class="game-shell" id="gameShell">

    <!-- Header -->
    <div class="game-header">
        <h1>🥧 World of Pi</h1>
        <div class="subtitle">Memory Tile Challenge</div>
    </div>

    <!-- Stats Bar (NO EMOJIS) -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" id="moveCount">0</div>
            <div class="stat-label">Moves</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="matchCount">0</div>
            <div class="stat-label">Matches</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="timerDisplay">0:00</div>
            <div class="stat-label">Time</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="bestScore">—</div>
            <div class="stat-label">Best</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-container">
        <div class="control-group">
            <label>Grid:</label>
            <button class="size-btn active" data-size="4" onclick="setGridSize(4)">4×4</button>
            <button class="size-btn" data-size="6" onclick="setGridSize(6)">6×6</button>
            <button class="size-btn" data-size="8" onclick="setGridSize(8)">8×8</button>
        </div>
        <button class="btn-action btn-restart" onclick="restartGame()">Restart</button>
    </div>

    <!-- Theme Legend -->
    <div class="theme-badges">
        <div class="theme-badge badge-raspberry"><span class="badge-dot"></span> Raspberry Pi</div>
        <div class="theme-badge badge-choco"><span class="badge-dot"></span> Choco Pie</div>
        <div class="theme-badge badge-pie"><span class="badge-dot"></span> Pies</div>
        <div class="theme-badge badge-math"><span class="badge-dot"></span> Math π</div>
    </div>

    <!-- Timer Bar -->
    <div class="timer-bar">
        <div class="timer-bar-inner">
            <div class="timer-bar-fill" id="timerBarFill"></div>
        </div>
    </div>

    <!-- Game Board -->
    <div class="game-board-wrapper">
        <div class="game-board" id="gameBoard"></div>
    </div>
    </main>

    <!-- Win Overlay -->
    <div class="win-overlay" id="winOverlay">
        <div class="win-card">
            <div class="trophy">🏆</div>
            <h2>You Win!</h2>
            <p class="win-subtitle">All pies have been matched!</p>
            <div class="star-rating" id="starRating"></div>
            <div class="win-stats">
                <div class="win-stat">
                    <div class="ws-value" id="winMoves">0</div>
                    <div class="ws-label">Moves</div>
                </div>
                <div class="win-stat">
                    <div class="ws-value" id="winTime">0:00</div>
                    <div class="ws-label">Time</div>
                </div>
                <div class="win-stat">
                    <div class="ws-value" id="winAccuracy">0%</div>
                    <div class="ws-label">Accuracy</div>
                </div>
            </div>
            <button class="btn-play-again" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // ===== TILE DATA - All "Pi" themed! =====
        const TILE_DATA = [
            // Raspberry Pi category
            { emoji: '🍇', label: 'Raspberry Pi', theme: 'raspberry' },
            { emoji: '🔌', label: 'GPIO Pins', theme: 'raspberry' },
            { emoji: '💻', label: 'Pi Terminal', theme: 'raspberry' },
            { emoji: '🐧', label: 'Linux Pi', theme: 'raspberry' },
            { emoji: '📡', label: 'Pi WiFi', theme: 'raspberry' },
            { emoji: '🤖', label: 'Pi Robot', theme: 'raspberry' },
            { emoji: '📸', label: 'Pi Camera', theme: 'raspberry' },
            { emoji: '🔧', label: 'Pi Config', theme: 'raspberry' },

            // Choco Pie category
            { emoji: '🍫', label: 'Choco Pie', theme: 'choco' },
            { emoji: '🧁', label: 'Choco Muffin', theme: 'choco' },
            { emoji: '🍪', label: 'Choco Cookie', theme: 'choco' },
            { emoji: '🍩', label: 'Choco Donut', theme: 'choco' },
            { emoji: '🎂', label: 'Choco Cake', theme: 'choco' },
            { emoji: '🍦', label: 'Choco Ice', theme: 'choco' },
            { emoji: '☕', label: 'Hot Choco', theme: 'choco' },
            { emoji: '🥜', label: 'Choco Nut', theme: 'choco' },

            // Pies category
            { emoji: '🥧', label: 'Apple Pie', theme: 'pie' },
            { emoji: '🍰', label: 'Cream Pie', theme: 'pie' },
            { emoji: '🎃', label: 'Pumpkin Pie', theme: 'pie' },
            { emoji: '🍋', label: 'Lemon Pie', theme: 'pie' },
            { emoji: '🍒', label: 'Cherry Pie', theme: 'pie' },
            { emoji: '🫐', label: 'Berry Pie', theme: 'pie' },
            { emoji: '🍑', label: 'Peach Pie', theme: 'pie' },
            { emoji: '🥥', label: 'Coconut Pie', theme: 'pie' },

            // Mathematical Pi category
            { emoji: '🔢', label: 'Pi Digits', theme: 'math' },
            { emoji: '📐', label: 'Geometry', theme: 'math' },
            { emoji: '🌀', label: 'Pi Spiral', theme: 'math' },
            { emoji: '📊', label: 'Pi Graph', theme: 'math' },
            { emoji: '🧮', label: 'Calculate π', theme: 'math' },
            { emoji: '♾️', label: 'Infinite π', theme: 'math' },
            { emoji: '📏', label: 'Circumference', theme: 'math' },
            { emoji: '🔵', label: 'Circle π', theme: 'math' },
        ];

        // ===== GAME STATE =====
        let gridSize = 4;
        let tiles = [];
        let flippedTiles = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let moves = 0;
        let isLocked = false;
        let timerInterval = null;
        let seconds = 0;
        let gameStarted = false;
        let bestScores = JSON.parse(localStorage.getItem('piMemoryBest') || '{}');

        function updateResponsiveBoard() {
            const shell = document.getElementById('gameShell');
            const boardWrapper = document.querySelector('.game-board-wrapper');
            const board = document.getElementById('gameBoard');

            if (!shell || !boardWrapper || !board) return;

            const nonBoardHeight = Array.from(shell.children)
                .filter(section => !section.classList.contains('game-board-wrapper'))
                .reduce((total, section) => total + section.getBoundingClientRect().height, 0);

            const wrapperStyles = window.getComputedStyle(boardWrapper);
            const shellStyles = window.getComputedStyle(shell);
            const wrapperPadding =
                parseFloat(wrapperStyles.paddingTop) +
                parseFloat(wrapperStyles.paddingBottom);
            const shellPaddingBottom = parseFloat(shellStyles.paddingBottom);

            const availableHeight = window.innerHeight - nonBoardHeight - wrapperPadding - shellPaddingBottom - 8;
            const availableWidth = boardWrapper.clientWidth;
            const boardSize = Math.max(140, Math.min(availableWidth, availableHeight, 700));

            document.documentElement.style.setProperty('--board-size', `${boardSize}px`);
            document.body.classList.toggle('compact-layout', window.innerHeight < 860 || availableHeight < 420);
        }

        // ===== INIT =====
        function init() {
            createBackground();
            updateBestScore();
            startGame();
        }

        // ===== FLOATING BACKGROUND =====
        function createBackground() {
            const container = document.getElementById('bgAnimation');
            const symbols = ['π', '🥧', '3.14', '🍫', '🍇', '∞', '📐', '🔌', '🍰', '🧮'];
            for (let i = 0; i < 30; i++) {
                const span = document.createElement('span');
                span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                span.style.animationDuration = (Math.random() * 20 + 15) + 's';
                span.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(span);
            }
        }

        // ===== SET GRID SIZE =====
        function setGridSize(size) {
            gridSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.size) === size);
            });
            startGame();
        }

        // ===== START GAME =====
        function startGame() {
            // Reset state
            clearInterval(timerInterval);
            seconds = 0;
            moves = 0;
            matchedPairs = 0;
            flippedTiles = [];
            isLocked = false;
            gameStarted = false;

            totalPairs = (gridSize * gridSize) / 2;

            // Update UI
            document.getElementById('moveCount').textContent = '0';
            document.getElementById('matchCount').textContent = '0';
            document.getElementById('timerDisplay').textContent = '0:00';
            document.getElementById('timerBarFill').style.width = '0%';
            document.getElementById('winOverlay').classList.remove('show');

            // Select tiles
            const shuffled = [...TILE_DATA].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, totalPairs);
            let pairs = [...selected, ...selected];

            // Fisher-Yates shuffle
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }

            tiles = pairs;

            // Build board
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            tiles.forEach((data, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = index;
                tile.innerHTML = `
                    <div class="tile-inner">
                        <div class="tile-front"></div>
                        <div class="tile-back theme-${data.theme}">
                            <span class="tile-emoji">${data.emoji}</span>
                            <span class="tile-label">${data.label}</span>
                        </div>
                    </div>
                `;
                tile.addEventListener('click', () => flipTile(tile, index));
                board.appendChild(tile);
            });

            // Adjust font sizes for larger grids
            if (gridSize >= 8) {
                board.style.gap = '6px';
                board.querySelectorAll('.tile-emoji').forEach(el => el.style.fontSize = '1.6rem');
                board.querySelectorAll('.tile-label').forEach(el => el.style.fontSize = '0');
            } else if (gridSize >= 6) {
                board.style.gap = '8px';
                board.querySelectorAll('.tile-emoji').forEach(el => el.style.fontSize = '2rem');
                board.querySelectorAll('.tile-label').forEach(el => el.style.fontSize = '0.5rem');
            } else {
                board.style.gap = '12px';
            }

            requestAnimationFrame(updateResponsiveBoard);
            updateBestScore();
        }

        // ===== FLIP TILE =====
        function flipTile(tile, index) {
            if (isLocked) return;
            if (tile.classList.contains('flipped') || tile.classList.contains('matched')) return;
            if (flippedTiles.length >= 2) return;

            // Start timer on first click
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            tile.classList.add('flipped');
            flippedTiles.push({ tile, index, data: tiles[index] });

            if (flippedTiles.length === 2) {
                moves++;
                document.getElementById('moveCount').textContent = moves;
                checkMatch();
            }
        }

        // ===== CHECK MATCH =====
        function checkMatch() {
            const [first, second] = flippedTiles;
            isLocked = true;

            if (first.data.emoji === second.data.emoji && first.index !== second.index) {
                // Match!
                setTimeout(() => {
                    first.tile.classList.add('matched');
                    second.tile.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('matchCount').textContent = matchedPairs;
                    flippedTiles = [];
                    isLocked = false;

                    createMiniConfetti(second.tile);

                    if (matchedPairs === totalPairs) {
                        setTimeout(winGame, 600);
                    }
                }, 400);
            } else {
                // No match — shake & flip back
                setTimeout(() => {
                    first.tile.classList.add('shake');
                    second.tile.classList.add('shake');

                    setTimeout(() => {
                        first.tile.classList.remove('flipped', 'shake');
                        second.tile.classList.remove('flipped', 'shake');
                        flippedTiles = [];
                        isLocked = false;
                    }, 600);
                }, 800);
            }
        }

        // ===== TIMER =====
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const min = Math.floor(seconds / 60);
                const sec = seconds % 60;
                document.getElementById('timerDisplay').textContent =
                    `${min}:${sec.toString().padStart(2, '0')}`;

                const progress = Math.min((seconds / 300) * 100, 100);
                document.getElementById('timerBarFill').style.width = progress + '%';
            }, 1000);
        }

        // ===== WIN GAME =====
        function winGame() {
            clearInterval(timerInterval);

            const accuracy = Math.round((totalPairs / moves) * 100);
            const stars = getStarRating(moves, totalPairs);

            const key = `grid${gridSize}`;
            if (!bestScores[key] || moves < bestScores[key]) {
                bestScores[key] = moves;
                localStorage.setItem('piMemoryBest', JSON.stringify(bestScores));
            }
            updateBestScore();

            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('winMoves').textContent = moves;
            document.getElementById('winTime').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
            document.getElementById('winAccuracy').textContent = accuracy + '%';

            let starsHTML = '';
            for (let i = 0; i < 3; i++) {
                starsHTML += i < stars ? '⭐' : '<span class="star-empty">⭐</span>';
            }
            document.getElementById('starRating').innerHTML = starsHTML;

            document.getElementById('winOverlay').classList.add('show');
            launchConfetti();
        }

        function getStarRating(moves, pairs) {
            const ratio = moves / pairs;
            if (ratio <= 1.3) return 3;
            if (ratio <= 1.8) return 2;
            return 1;
        }

        function updateBestScore() {
            const key = `grid${gridSize}`;
            const best = bestScores[key];
            document.getElementById('bestScore').textContent = best ? best : '—';
        }

        // ===== RESTART =====
        function restartGame() {
            document.getElementById('winOverlay').classList.remove('show');
            document.getElementById('confettiContainer').innerHTML = '';
            startGame();
        }

        // ===== CONFETTI =====
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const emojis = ['🥧', '🍫', '🍇', 'π', '🎉', '✨', '🏆', '🍰', '🌟', '💜'];

            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    container.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        function createMiniConfetti(tile) {
            const rect = tile.getBoundingClientRect();
            const container = document.getElementById('confettiContainer');
            const sparks = ['✨', '💫', '⭐'];

            for (let i = 0; i < 6; i++) {
                const spark = document.createElement('div');
                spark.className = 'confetti';
                spark.textContent = sparks[Math.floor(Math.random() * sparks.length)];
                spark.style.left = (rect.left + rect.width / 2) + 'px';
                spark.style.top = rect.top + 'px';
                spark.style.fontSize = '1rem';
                spark.style.animationDuration = '1.5s';
                container.appendChild(spark);
                setTimeout(() => spark.remove(), 1500);
            }
        }

        // ===== KICK IT OFF =====
        init();
        window.addEventListener('resize', updateResponsiveBoard);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateResponsiveBoard);
        }
        requestAnimationFrame(updateResponsiveBoard);
    </script>
</body>
</html>
